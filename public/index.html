<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kindling WApp</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="login" id="login">
        <div>
          <h1>Kindling</h1>
          <p>Sign in with Nostr to build service offerings, scan target lists, and draft outreach with Wingman Autopilot pipelines.</p>
        </div>
        <button id="loginButton">Sign in with Nostr</button>
        <p class="error" id="loginError"></p>
      </section>

      <section class="home hidden" id="home">
        <div class="homeInner">
          <header class="homeHeader">
            <div class="brandLockup">
              <img class="brandMark" src="/assets/kindling-campfire-logo.png" alt="" />
              <span>Kindling</span>
            </div>
            <h1>Business development workspace</h1>
          </header>
          <div class="homeActions">
            <button id="homeServiceButton" type="button"><span>01</span><strong>Service offering</strong></button>
            <button id="homeTargetsButton" type="button"><span>02</span><strong>Target list</strong></button>
            <button id="homeReviewButton" type="button"><span>03</span><strong>Today's targets</strong></button>
            <button id="homeActButton" type="button"><span>04</span><strong>Companies</strong></button>
          </div>
          <div class="homeUtilities">
            <button id="homeSettingsButton" type="button">Settings</button>
            <button id="homeChatButton" type="button">Chat</button>
          </div>
        </div>
      </section>

      <section class="actPage hidden" id="actPage"></section>

      <section class="settingsPage hidden" id="settingsPage">
        <div class="settingsFrame">
          <header class="pageHeader">
            <h1>Settings</h1>
            <button id="settingsHomeButton" type="button">Home</button>
          </header>
          <section class="settingsGrid">
            <div class="settingsPanel">
              <h2>Autopilot</h2>
              <label>
                <span>Autopilot URL</span>
                <input id="autopilotUrlInput" type="url" placeholder="http://127.0.0.1:3256" />
              </label>
              <label>
                <span>Default chat pipeline</span>
                <select id="pipelineSelect"></select>
                <input id="pipelineInput" type="text" placeholder="chat-wapp-agent-response" />
              </label>
              <div class="settingsRoleHeader">
                <h3>Kindling pipeline roles</h3>
                <p id="settingsStatus">Ready</p>
              </div>
              <div id="settingsRoleList" class="settingsRoleList"></div>
              <div class="settingsActions">
                <button id="loadPipelinesButton" type="button">Refresh Pipelines</button>
                <button id="saveSettingsButton" type="button">Save</button>
              </div>
            </div>
            <div class="settingsPanel">
              <h2>Access</h2>
              <label>
                <span>Npub</span>
                <input id="accessNpubInput" type="text" placeholder="npub1..." />
              </label>
              <label>
                <span>Role</span>
                <select id="accessRoleSelect">
                  <option value="read">Read</option>
                  <option value="edit">Edit</option>
                </select>
              </label>
              <button id="addAccessButton" type="button">Add access</button>
              <div id="accessList" class="accessList"></div>
            </div>
          </section>
        </div>
      </section>

      <section class="shell hidden" id="shell">
        <aside class="sidebar">
          <div class="sidebarTop">
            <div>
              <div class="eyebrow">Signed in</div>
              <div class="npub" id="npub"></div>
            </div>
            <button id="logoutButton" title="Sign out">Sign out</button>
          </div>
          <button class="newChat" id="newChatButton">New chat</button>
          <nav id="chatList" class="chatList"></nav>
        </aside>

        <section class="chatPane">
          <header class="chatHeader">
            <h2 id="chatTitle">New chat</h2>
            <div class="status" id="status">Ready</div>
          </header>
          <div class="messages" id="messages"></div>
          <form class="composer" id="composer">
            <textarea id="messageInput" rows="1" placeholder="Send a message"></textarea>
            <button id="sendButton" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
